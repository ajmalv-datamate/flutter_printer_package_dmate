group 'com.dmate.printer_package'
version '1.0-SNAPSHOT'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        flatDir {
            dirs 'libs'
        }
    }
}

apply plugin: 'com.android.library'

android {
    namespace 'com.dmate.printer_package'
    compileSdkVersion 33

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 21
    }

    buildFeatures {
        aidl true
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'], exclude: ['zxingcore.jar', 'printer-lib-2.2.4.aar'])
    compileOnly files('libs/printer-lib-2.2.4.aar')
    implementation 'com.google.zxing:core:3.5.0'
    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'com.sunmi:printerlibrary:1.0.18'
    implementation 'io.github.jeremyliao:live-event-bus-x:1.8.0'
}
